name: propose-afternoon

on:
  workflow_dispatch:          # enable manual runs from Actions tab
  push:                       # also runs on pushes to master (helps GitHub detect it)
    branches:
      - master
    paths:
      - ".github/workflows/propose-afternoon.yml"
      - "propose.py"
  schedule:
    - cron: "30 15 * * *"     # 21:00 IST daily (UTC+5:30 -> 15:30 UTC)

permissions:
  contents: read
  issues: write

jobs:
  propose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Propose topics for tomorrow afternoon slot
        env:
          REGION: IN
          SLOT: afternoon
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python propose.py
