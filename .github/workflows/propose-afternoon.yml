name: propose-afternoon

on:
  workflow_dispatch:          # manual runs
  push:                       # also run on push to default branches
    branches: [main, master]
    paths:
      - ".github/workflows/propose-afternoon.yml"
      - "propose.py"
  schedule:
    - cron: "30 15 * * *"     # 21:00 IST daily (UTC+5:30 -> 15:30 UTC)

permissions:
  contents: read
  issues: write

jobs:
  propose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt
      - name: Propose topics for tomorrow afternoon slot
        env:
          REGION: IN
          SLOT: afternoon
          DEBUG: "1"
          # Use the built-in token; more reliable than secrets.GITHUB_TOKEN
          GITHUB_TOKEN: ${{ github.token }}
          # Needed to call YouTube Data API for Trending
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: |
          echo "GITHUB_REPOSITORY=$GITHUB_REPOSITORY"
          python propose.py