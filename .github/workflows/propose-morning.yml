name: propose-morning

on:
  workflow_dispatch:          # manual runs
  push:                       # helps GitHub detect it on master
    branches:
      - master
    paths:
      - ".github/workflows/propose-morning.yml"
      - "propose.py"
  schedule:
    - cron: "30 13 * * *"     # 19:00 IST daily (UTC+5:30 -> 13:30 UTC)

permissions:
  contents: read
  issues: write

jobs:
  propose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt
      - name: Propose topics for tomorrow morning slot
        env:
          REGION: IN
          SLOT: morning
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python propose.py
