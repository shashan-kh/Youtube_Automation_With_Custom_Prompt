name: propose-morning
on:
  schedule:
    - cron: "30 13 * * *"  # 19:00 IST daily (UTC+5:30 -> 13:30 UTC)
  workflow_dispatch:
permissions:
  contents: read
  issues: write
jobs:
  propose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Propose topics for tomorrow morning slot
        env:
          REGION: "IN"
          SLOT: "morning"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python propose.py
