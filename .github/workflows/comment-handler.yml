name: comment-handler

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write

jobs:
  handle:
    runs-on: ubuntu-latest
    if: ${{ contains(github.event.comment.body, '/approve-topic') ||
            contains(github.event.comment.body, '/reject-topic')  ||
            contains(github.event.comment.body, '/approve-video') ||
            contains(github.event.comment.body, '/reject-video')  ||
            contains(github.event.comment.body, '/regenerate-video') ||
            contains(github.event.comment.body, '/new-topic') ||
            contains(github.event.comment.body, '/custom-topic') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Dump event payload (debug)
        run: cat "$GITHUB_EVENT_PATH"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libass9 fonts-dejavu-core

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt
          # Ensure 'packaging' is present for google-api-core
          python -m pip install --upgrade packaging
          python - << 'PY'
          import sys
          print("Python:", sys.version)
          import packaging
          print("packaging:", packaging.__version__)
          import moviepy, gtts, googleapiclient, pytrends
          print("Imports OK")
          PY

      # Only check heavy secrets for actions that actually need them
      - name: Check required secrets
        if: ${{ contains(github.event.comment.body, '/approve-topic') ||
                contains(github.event.comment.body, '/approve-video') ||
                contains(github.event.comment.body, '/regenerate-video') ||
                contains(github.event.comment.body, '/reject-video') ||
                contains(github.event.comment.body, '/custom-topic') }}
        shell: bash
        run: |
          missing=0
          for v in GROQ_API_KEY PEXELS_API_KEY YT_CLIENT_ID YT_CLIENT_SECRET YT_REFRESH_TOKEN; do
            if [ -z "${!v}" ]; then
              echo "::error ::Missing secret $v"; missing=1
            else
              echo "$v=***"
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "One or more secrets are missing"; exit 1
          fi
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}

      - name: Handle comment
        env:
          REGION: IN
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          TTS_LANG: en
          GROQ_MODEL: qwen/qwen3-32b
          GROQ_FALLBACK_MODELS: llama-3.3-70b-versatile,llama-3.1-8b-instant,openai/gpt-oss-20b,openai/gpt-oss-120b,groq/compound-mini,groq/compound,moonshotai/kimi-k2-instruct
        run: python handle_comment.py
