name: comment-handler
on:
  issue_comment:
    types: [created]
permissions:
  contents: read
  issues: write
jobs:
  handle:
    if: |
      contains(github.event.comment.body, '/approve-topic') ||
      contains(github.event.comment.body, '/reject-topic')  ||
      contains(github.event.comment.body, '/approve-video') ||
      contains(github.event.comment.body, '/reject-video')  ||
      contains(github.event.comment.body, '/regenerate-video') ||
      contains(github.event.comment.body, '/new-topic')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-dejavu-core
      - name: Install Python deps
        run: pip install -r requirements.txt
      - name: Handle comment
        env:
          REGION: "IN"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          TTS_LANG: "en"
        run: python handle_comment.py
