name: comment-handler

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write

jobs:
  handle:
    runs-on: ubuntu-latest
    if: ${{ contains(github.event.comment.body, '/approve-topic') ||
            contains(github.event.comment.body, '/reject-topic')  ||
            contains(github.event.comment.body, '/approve-video') ||
            contains(github.event.comment.body, '/reject-video')  ||
            contains(github.event.comment.body, '/regenerate-video') ||
            contains(github.event.comment.body, '/new-topic') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Dump event payload (debug)
        run: cat "$GITHUB_EVENT_PATH"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt
          python - << 'PY'
          import sys
          print("Python:", sys.version)
          import moviepy, gtts, googleapiclient, pytrends
          print("Imports OK")
          PY

      - name: Check required secrets
        shell: bash
        run: |
          missing=0
          for v in GROQ_API_KEY PEXELS_API_KEY YT_CLIENT_ID YT_CLIENT_SECRET YT_REFRESH_TOKEN; do
            if [ -z "${!v}" ]; then
              echo "::error ::Missing secret $v"; missing=1
            else
              echo "$v=***"
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "One or more secrets are missing"; exit 1
          fi
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}

      - name: Handle comment
        env:
          REGION: IN
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          TTS_LANG: en
          GROQ_MODEL: mistral-saba-24b   # Use Groq mistral-saba-24b
        run: python handle_comment.py
